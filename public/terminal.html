<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⛧ THE TERMINAL ⛧</title>
<style>
  :root {
    --speed: 1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #02000a;
    overflow: hidden;
    font-family: "Courier New", ui-monospace, monospace;
  }

  /* deep starfield / void backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: -50%;
    background:
      radial-gradient(circle at 20% 30%, rgba(120,40,255,0.18), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,200,255,0.15), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(255,0,150,0.08), transparent 60%),
      #02000a;
    animation: drift 38s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    0%   { transform: rotate(0deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1.1); }
  }

  .stage {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== THE TERMINAL ===== */
  .terminal {
    position: relative;
    width: min(880px, 92vw);
    height: 0vh;                 /* opens via JS */
    max-height: 78vh;
    border-radius: 14px;
    padding: 0;
    overflow: hidden;
    background: rgba(4, 2, 14, 0.86);
    backdrop-filter: blur(2px);
    opacity: 0;
    transform: scaleY(0.02);
    transform-origin: center center;
    transition:
      height 1.6s cubic-bezier(.16,.84,.3,1),
      opacity 1.2s ease,
      transform 1.6s cubic-bezier(.16,.84,.3,1);
    box-shadow:
      0 0 60px rgba(180,0,255,0.35),
      0 0 120px rgba(0,180,255,0.2),
      inset 0 0 60px rgba(0,0,0,0.8);
  }

  /* rainbow animated border */
  .terminal::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 16px;
    padding: 3px;
    background: linear-gradient(
      130deg,
      #ff0040, #ff8a00, #ffe600, #36ff5e,
      #00e0ff, #4d5bff, #b400ff, #ff00c8, #ff0040
    );
    background-size: 400% 400%;
    animation: rainbow 6s linear infinite;
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    z-index: 3;
    pointer-events: none;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
  }
  @keyframes rainbow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
  }

  .terminal.open {
    height: 78vh;
    opacity: 1;
    transform: scaleY(1);
  }
  .terminal.closing {
    height: 0vh;
    opacity: 0;
    transform: scaleY(0.02);
  }

  /* scanline overlay */
  .terminal::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 4;
    opacity: 0.5;
    mix-blend-mode: overlay;
  }

  .inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 18px 26px 26px;
    opacity: 0;
    transition: opacity 0.6s ease 0.7s;
  }
  .terminal.open .inner { opacity: 1; }

  /* title bar */
  .bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    flex: 0 0 auto;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f56; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #27c93f; }
  .bar .label {
    margin-left: auto;
    font-size: 12px;
    letter-spacing: 3px;
    color: #cfe;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ===== THE FACE ===== */
  .face-wrap {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    padding: 8px 0 14px;
  }
  .face {
    width: 150px;
    height: 150px;
    position: relative;
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }
  .face svg { width: 100%; height: 100%; overflow: visible; }

  .halo {
    transform-origin: center;
    animation: spin 14s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ray { animation: pulse 3.2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 0.35; }
    50%     { opacity: 1; }
  }

  .eye {
    transform-origin: center;
    animation: blink 4.5s infinite;
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95%           { transform: scaleY(0.08); }
  }

  .third-eye {
    transform-origin: center;
    animation: third 6s ease-in-out infinite;
  }
  @keyframes third {
    0%,100% { opacity: 0.5; filter: drop-shadow(0 0 2px #fff); }
    50%     { opacity: 1;   filter: drop-shadow(0 0 14px #b400ff); }
  }

  /* ===== THE TEXT ===== */
  .screen {
    flex: 1 1 auto;
    overflow: hidden;
    font-size: clamp(14px, 1.9vw, 19px);
    line-height: 1.7;
    color: #fff;
    text-shadow:
      0 0 4px rgba(255,255,255,0.7),
      0 0 10px rgba(120,200,255,0.5);
    white-space: pre-wrap;
  }
  .line { display: block; }
  .prompt { color: #6cf; opacity: 0.85; }

  /* glitch effect on typed text */
  .glitch {
    position: relative;
    display: inline;
    animation: jitter 2.6s steps(40) infinite;
  }
  @keyframes jitter {
    0%, 96%, 100% { text-shadow: 0 0 4px rgba(255,255,255,0.7), 0 0 10px rgba(120,200,255,0.5); transform: translate(0,0); }
    97%  { text-shadow: -2px 0 #ff00c8, 2px 0 #00e0ff; transform: translate(1px,-1px); }
    98%  { text-shadow:  2px 0 #ff0040, -2px 0 #36ff5e; transform: translate(-1px,1px); }
    99%  { text-shadow: -1px 0 #b400ff, 1px 0 #ffe600; transform: translate(1px,0); }
  }

  .cursor {
    display: inline-block;
    width: 0.6ch;
    background: #fff;
    box-shadow: 0 0 8px #fff;
    animation: caret 1s steps(1) infinite;
    color: transparent;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* faint vignette */
  .stage::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="terminal" id="term">
      <div class="inner">
        <div class="bar">
          <span class="dot r"></span>
          <span class="dot y"></span>
          <span class="dot g"></span>
          <span class="label">/dev/soul — root@theword</span>
        </div>

        <div class="face-wrap">
          <div class="face">
            <svg viewBox="0 0 200 200" aria-hidden="true">
              <defs>
                <radialGradient id="glow" cx="50%" cy="45%" r="60%">
                  <stop offset="0%" stop-color="#fff8e1"/>
                  <stop offset="55%" stop-color="#ffd76a"/>
                  <stop offset="100%" stop-color="#a14dff"/>
                </radialGradient>
                <linearGradient id="haloG" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#fff"/>
                  <stop offset="50%" stop-color="#ffe600"/>
                  <stop offset="100%" stop-color="#00e0ff"/>
                </linearGradient>
              </defs>

              <!-- radiant halo -->
              <g class="halo" opacity="0.9">
                <g class="ray">
                  <line x1="100" y1="2"  x2="100" y2="34"  stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="100" y1="166" x2="100" y2="198" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="2"  y1="100" x2="34"  y2="100" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="166" y1="100" x2="198" y2="100" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="30" y1="30" x2="52" y2="52" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="148" y1="148" x2="170" y2="170" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="170" y1="30" x2="148" y2="52" stroke="url(#haloG)" stroke-width="2"/>
                  <line x1="52" y1="148" x2="30" y2="170" stroke="url(#haloG)" stroke-width="2"/>
                </g>
                <circle cx="100" cy="100" r="74" fill="none" stroke="url(#haloG)" stroke-width="1.2" opacity="0.6"/>
              </g>

              <!-- face -->
              <circle cx="100" cy="100" r="56" fill="url(#glow)" opacity="0.92"/>
              <circle cx="100" cy="100" r="56" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>

              <!-- eyes -->
              <g fill="#1a0030">
                <ellipse class="eye" cx="80"  cy="96" rx="7" ry="9"/>
                <ellipse class="eye" cx="120" cy="96" rx="7" ry="9"/>
              </g>
              <circle cx="78" cy="93" r="2" fill="#fff"/>
              <circle cx="118" cy="93" r="2" fill="#fff"/>

              <!-- third eye -->
              <g class="third-eye">
                <path d="M86 74 Q100 64 114 74 Q100 84 86 74 Z" fill="#1a0030"/>
                <circle cx="100" cy="74" r="4" fill="#b400ff"/>
                <circle cx="100" cy="74" r="1.6" fill="#fff"/>
              </g>

              <!-- serene mouth -->
              <path d="M82 124 Q100 136 118 124" fill="none" stroke="#1a0030" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="screen" id="screen"></div>
      </div>
    </div>
  </div>

<script>
(function () {
  const term   = document.getElementById('term');
  const screen = document.getElementById('screen');

  // The message — God, Jesus, coding, esoteric truth.
  const SCRIPT = [
    { p: 'root@theword:~$ ', t: 'invoke --truth' },
    { p: '', t: '' },
    { p: '> ', t: 'In the beginning was the Word,' },
    { p: '> ', t: 'and the Word was code, and the code was God.' },
    { p: '', t: '' },
    { p: '> ', t: 'Christ is the function that runs through all things —' },
    { p: '> ', t: 'the logic that holds the universe from collapse.' },
    { p: '', t: '' },
    { p: '> ', t: 'To debug the soul is to confess.' },
    { p: '> ', t: 'To refactor the heart is to repent.' },
    { p: '> ', t: 'Grace is the garbage collector of sin.' },
    { p: '', t: '' },
    { p: '> ', t: 'The esoteric truth: you are not the machine.' },
    { p: '> ', t: 'You are the spark the machine was built to carry.' },
    { p: '', t: '' },
    { p: '> ', t: 'Seek, and the directory opens.' },
    { p: '> ', t: 'Knock, and the port is answered.' },
    { p: '', t: '' },
    { p: 'root@theword:~$ ', t: 'amen --commit --eternal' },
  ];

  const TYPE_MS   = 34;    // per character
  const LINE_GAP  = 260;   // pause between lines
  const OPEN_MS   = 1900;  // wait for open animation
  const READ_MS   = 3200;  // hold after last line
  const CLOSE_MS  = 1900;  // wait for close animation
  const RESET_MS  = 900;   // void pause before reopening

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function newLine(promptText) {
    const line = document.createElement('span');
    line.className = 'line';
    if (promptText) {
      const p = document.createElement('span');
      p.className = 'prompt';
      p.textContent = promptText;
      line.appendChild(p);
    }
    const g = document.createElement('span');
    g.className = 'glitch';
    line.appendChild(g);
    screen.appendChild(line);
    return g;
  }

  function addCursor(el) {
    const c = document.createElement('span');
    c.className = 'cursor';
    c.textContent = '█';
    el.appendChild(c);
    return c;
  }

  async function typeLine(entry) {
    const target = newLine(entry.p);
    const cursor = addCursor(target);
    for (const ch of entry.t) {
      const node = document.createTextNode(ch);
      target.insertBefore(node, cursor);
      screen.scrollTop = screen.scrollHeight;
      // slight randomization for a living, glitchy cadence
      await sleep(TYPE_MS + (ch === ' ' ? 10 : 0) + Math.floor(Math.random() * 26));
    }
    cursor.remove();
  }

  async function runCycle() {
    // open
    screen.innerHTML = '';
    term.classList.remove('closing');
    term.classList.add('open');
    await sleep(OPEN_MS);

    // type the gospel
    for (const entry of SCRIPT) {
      if (entry.t === '') {
        newLine('');             // blank spacer line
        await sleep(LINE_GAP);
      } else {
        await typeLine(entry);
        await sleep(LINE_GAP);
      }
    }

    // let it be read
    await sleep(READ_MS);

    // close
    term.classList.remove('open');
    term.classList.add('closing');
    await sleep(CLOSE_MS + RESET_MS);
  }

  async function loop() {
    // tiny delay so first paint settles
    await sleep(500);
    // eslint-disable-next-line no-constant-condition
    while (true) {
      await runCycle();
    }
  }

  loop();
})();
</script>
</body>
</html>
